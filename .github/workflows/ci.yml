name: CI

on:
  push:
    branches: ["master", "refactor/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.5"
      - run: ruff check .

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # dev extra = numpy + opencv + pytest + ruff. mediapipe NOT needed:
      # tests inject fake detectors / synthetic landmarks. Assets are committed,
      # so canonical/render/pipeline tests run rather than skip.
      - run: pip install -e ".[dev]"
      - run: pytest
      # #30 跨语言单一真源：web/src/services/constantsGenerated.ts 必须与 constants.py 同步
      # （改了 constants.py 却忘了重跑生成器即报错）。
      - name: web 常量与 constants.py 同步校验
        run: |
          python tools/gen_web_constants.py
          git diff --exit-code web/src/services/constantsGenerated.ts \
            || (echo '::error::web/src/services/constantsGenerated.ts 与 constants.py 不同步，请运行  python tools/gen_web_constants.py' && exit 1)

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run build
      # Pure-node parity tests pin Web TypeScript geometry services against the
      # Python reference (web/test/expected.json).
      - working-directory: web
        run: npm test

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: workers/api/package-lock.json
      - working-directory: workers/api
        run: npm ci
      - working-directory: workers/api
        run: npm run typecheck
      - working-directory: workers/api
        run: npm test

  deploy-worker:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [worker-tests]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Skip deploy when Cloudflare secrets are absent
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_D1_DATABASE_ID == '' || env.CLOUDFLARE_R2_BUCKET == ''
        run: echo "Cloudflare secrets are not configured; Worker deploy skipped."
      - name: Render wrangler bindings from secrets
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_D1_DATABASE_ID != '' && env.CLOUDFLARE_R2_BUCKET != ''
        working-directory: workers/api
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = "wrangler.jsonc";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.d1_databases[0].database_name = "langerface-prod";
          config.d1_databases[0].database_id = process.env.CLOUDFLARE_D1_DATABASE_ID;
          config.r2_buckets[0].bucket_name = process.env.CLOUDFLARE_R2_BUCKET;
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");
          NODE
      - name: Deploy Cloudflare Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_D1_DATABASE_ID != '' && env.CLOUDFLARE_R2_BUCKET != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/api
          command: deploy
