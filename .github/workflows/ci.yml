name: CI

on:
  push:
    branches: ["master", "refactor/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.5"
      - run: ruff check .

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # dev extra = numpy + opencv + pytest + ruff. mediapipe NOT needed:
      # tests inject fake detectors / synthetic landmarks. Assets are committed,
      # so canonical/render/pipeline tests run rather than skip.
      - run: pip install -e ".[dev]"
      - run: pytest
      # #30 跨语言单一真源：web/constants_generated.js 必须与 constants.py 同步
      # （改了 constants.py 却忘了重跑生成器即报错）。
      - name: web 常量与 constants.py 同步校验
        run: |
          python tools/gen_web_constants.py
          git diff --exit-code web/constants_generated.js \
            || (echo '::error::web/constants_generated.js 与 constants.py 不同步，请运行  python tools/gen_web_constants.py' && exit 1)

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run build
      # Pure-node parity tests pin web/geometry.js against the Python reference
      # (web/test/expected.json).
      - working-directory: web
        run: npm test
